name: ieee-trans-writing
version: 2.0.0
description: >
  Declarative router for IEEE Transactions manuscript drafting. SKILL.md uses
  this manifest to load only the fragments needed for TCYB, THMS, TNNLS, or
  generic IEEE-style section writing after the mathematical intake gate passes.

always_load:
  - ../_shared/ieee-trans-guidelines.md
  - static/core/stance.md
  - static/core/workflow.md
  - static/core/output-format.md

axes:
  paper_type:
    detect: |
      Decide what kind of IEEE Transactions manuscript or section is being
      drafted. Default to algorithmic for machine-learning, neural-network,
      signal-learning, contrastive-learning, and domain-generalization papers.
    values:
      research:       static/fragments/paper_type/research.md
      methods:        static/fragments/paper_type/methods.md
      hypothesis:     static/fragments/paper_type/hypothesis.md
      algorithmic:    static/fragments/paper_type/algorithmic.md
      review:         static/fragments/paper_type/review.md
    default: algorithmic
    multi: false

  section:
    detect: |
      Identify which section or sections the user wants drafted, rebuilt, or
      audited. Load every named section fragment. If the section is ambiguous
      and the math gate has passed, ask one concise clarification question.
    values:
      abstract:       static/fragments/section/abstract.md
      intro:          static/fragments/section/intro.md
      related-work:   static/fragments/section/related-work.md
      method:         static/fragments/section/method.md
      experiments:    static/fragments/section/experiments.md
      discussion:     static/fragments/section/discussion.md
      conclusion:     static/fragments/section/conclusion.md
      title:          static/fragments/section/title.md
    multi: true

  language:
    detect: |
      Detect the source language of the user's notes. Use zh-to-en when the
      input is Chinese, mixed Chinese-English, or organized as Chinese lab
      notes. Otherwise use en.
    values:
      en:             static/fragments/language/en.md
      zh-to-en:       static/fragments/language/zh-to-en.md
    default: en
    multi: false

  journal:
    detect: |
      Use the exact IEEE Transactions venue named by the user. Map IEEE
      Transactions on Cybernetics to TCYB, IEEE Transactions on Human-Machine
      Systems to THMS, and IEEE Transactions on Neural Networks and Learning
      Systems to TNNLS. Use generic-ieee when the user gives no venue.
    values:
      tcyb:           static/fragments/journal/tcyb.md
      thms:           static/fragments/journal/thms.md
      tnnls:          static/fragments/journal/tnnls.md
      generic-ieee:   static/fragments/journal/generic-ieee.md
    default: generic-ieee
    multi: false

references:
  on_demand:
    - condition: needs IEEE section-level structure, argument order, or reviewer-defense patterning
      path: references/article-architecture.md
    - condition: drafting or revising an IEEE abstract
      path: references/abstract.md
    - condition: drafting or revising an IEEE introduction
      path: references/introduction.md
    - condition: rebuilding related work as obstacle-based technical synthesis
      path: references/related-work.md
    - condition: writing equation-first method sections, algorithms, objectives, or complexity notes
      path: references/method.md
    - condition: planning or writing experiments around OOD protocols, baselines, ablations, metrics, visualizations, or complexity
      path: references/experiments.md
    - condition: writing a bounded conclusion with contribution, evidence, limitation, and deployment boundary
      path: references/conclusion.md
    - condition: user asks whether a paragraph flows; use reverse outlining
      path: references/paragraph-flow.md
    - condition: final manuscript self-review, rejection-risk audit, claim-evidence alignment
      path: references/paper-review.md
    - condition: deeper Chinese-author repair patterns beyond the language fragment
      path: references/chinese-author-workflow.md
